<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolão Copa 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="auth-card">
      <h1 id="form-title">Entrar no Bolão</h1>
      
      <form id="auth-form">
        <!-- O campo nome só aparece no cadastro -->
        <div id="name-group" class="hidden">
          <label for="nome">Nome ou Apelido</label>
          <input type="text" id="nome" placeholder="Como a galera te chama?">
        </div>
        
        <label for="email">E-mail</label>
        <input type="email" id="email" required placeholder="seu@email.com">
        
<label for="senha">Senha</label>
        <input type="password" id="senha" required placeholder="Mínimo de 6 caracteres">

<div style="text-align: center; margin-bottom: 20px;">
            <button type="button" id="btn-mostrar-bolao" style="background: none; border: none; color: #2e7d32; font-weight: bold; cursor: pointer; text-decoration: underline; font-size: 0.95em;">
                + Entrar ou Criar um Bolão (Opcional)
            </button>
        </div>

        <div id="caixa-rede-bolao" class="hidden" style="background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; margin-bottom: 20px;">
            
            <p style="font-size: 0.9em; color: #555; margin-top: 0; margin-bottom: 15px; text-align: center; font-weight: bold;">
                Rede do Bolão:
            </p>
            
            <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 15px;">
                <label style="cursor: pointer;"><input type="radio" name="tipo_bolao" value="entrar" checked> Entrar em Existente</label>
                <label style="cursor: pointer;"><input type="radio" name="tipo_bolao" value="criar"> Criar Novo</label>
            </div>
            
            <input type="text" id="auth-bolao-nome" placeholder="Código do Bolão (ex: X7B9K)" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box;">
        </div>
        <button type="submit" id="submit-btn">Entrar</button>
      </form>

      <p id="toggle-text">Ainda não tem conta? <a href="#" id="toggle-link">Cadastre-se</a></p>
      <p id="error-msg" class="error hidden"></p>
    </div>
  </div>
  
  <script type="module" src="auth.js"></script>
</body>
</html>
